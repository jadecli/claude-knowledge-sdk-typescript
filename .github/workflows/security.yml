name: Security Review

# WARNING: Not hardened against prompt injection. Only review trusted PRs.
# Recommend: enable 'Require approval for all external contributors' in repo settings

on:
  pull_request:

permissions:
  pull-requests: write
  contents: read

jobs:
  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 2

      - uses: anthropics/claude-code-security-review@main
        with:
          claude-api-key: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          comment-pr: 'true'
          exclude-directories: 'node_modules,dist,coverage,.claude'
          custom-security-scan-instructions: |
            This is a TypeScript SDK project (@jadecli/claude-knowledge-sdk).
            Focus security review on:
            1. Command injection via Bash tool patterns (the SDK generates shell commands)
            2. Path traversal in plugin validation (isValidPluginName, isValidMarketplaceUrl)
            3. URL validation in DocUrl smart constructor and marketplace URL checks
            4. YAML injection in workflow generator output (generateWorkflow, generatePresetWorkflow)
            5. Template literal injection in MCPB manifest builder (${__dirname}, ${user_config.*})
            6. Prototype pollution in deep merge patterns (MCP config merging)
            7. Secret exposure in generated workflow YAML (ensure tokens use ${{ secrets.* }})
            Rate all findings as CRITICAL, HIGH, MEDIUM, or LOW.
            Flag any pattern where user input flows into shell commands or YAML output unescaped.
