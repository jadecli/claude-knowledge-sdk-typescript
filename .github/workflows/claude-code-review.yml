name: Claude Code Review

on:
  pull_request:
    types: [opened, synchronize, ready_for_review, reopened]

jobs:
  claude-review:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      pull-requests: write
      id-token: write
      actions: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      # The review prompt below is kept concise to minimize per-PR token cost.
      # Detailed standards are in CLAUDE.md which Claude Code loads automatically.
      - name: Run Claude Code Review
        id: claude-review
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          track_progress: true
          claude_args: |
            --allowedTools "Read,Glob,Grep,Bash(npm run typecheck),Bash(npm test),Bash(gh pr diff:*),Bash(gh pr view:*),Bash(gh pr comment:*),Bash(gh run view:*),mcp__github_inline_comment__create_inline_comment"
          prompt: |
            REPO: ${{ github.repository }}
            PR NUMBER: ${{ github.event.pull_request.number }}

            Review this PR. Run `npm run typecheck && npm test` first.
            Check CLAUDE.md for the project's Boris Cherny TypeScript standards.

            BLOCKING issues (request changes): missing readonly, bare any, try/catch across boundaries, missing tests for new functions, broken types.
            Post APPROVE if all checks pass and CI is green, or REQUEST_CHANGES with specific file:line fixes needed.
