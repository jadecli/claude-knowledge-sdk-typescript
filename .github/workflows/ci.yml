name: CI

on:
  push:
    branches: [main]
  pull_request:

# This is the merge gate. ALL jobs must pass before PR can merge.
# Configure branch protection: require "typecheck", "build", "test", "lint" to pass.

jobs:
  typecheck:
    name: Typecheck (tsc --noEmit)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
      - run: npm ci --legacy-peer-deps
      - run: npm run typecheck

  build:
    name: Build (tsc)
    needs: typecheck
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
      - run: npm ci --legacy-peer-deps
      - run: npm run build
      - name: Verify dist outputs
        run: |
          test -f dist/index.js || (echo "ERROR: dist/index.js not found" && exit 1)
          test -f dist/index.d.ts || (echo "ERROR: dist/index.d.ts not found" && exit 1)
          test -f dist/cli.js || (echo "ERROR: dist/cli.js not found" && exit 1)
          echo "Build outputs verified: index.js, index.d.ts, cli.js"

  test:
    name: Test (vitest)
    needs: typecheck
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
      - run: npm ci --legacy-peer-deps
      - name: Run tests and verify count
        run: |
          npm test 2>&1 | tee /tmp/test-output.txt
          COUNT=$(grep -oP '\d+ passed' /tmp/test-output.txt | grep -oP '\d+' || echo "0")
          echo "Tests passed: $COUNT"
          if [ "$COUNT" -lt 80 ]; then
            echo "ERROR: Expected at least 80 tests, got $COUNT"
            exit 1
          fi

  lint:
    name: Lint (Prettier)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
      - run: npm ci --legacy-peer-deps
      - run: npx prettier --check "src/**/*.ts"
