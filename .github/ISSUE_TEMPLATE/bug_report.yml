name: Bug Report
description: Report a bug
labels: [bug]
body:
  - type: textarea
    id: description
    attributes:
      label: Describe the bug
      description: A clear description of what the bug is
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Steps to reproduce the behavior
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What you expected to happen
  - type: input
    id: version
    attributes:
      label: SDK version
      placeholder: "0.1.0"
  - type: dropdown
    id: module
    attributes:
      label: Module
      options:
        - types
        - agent
        - knowledge
        - context
        - monitoring
        - cli
        - crawler
        - plugin
